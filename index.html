<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1'/>
<title>2026-27 Proposal Shortlist Tool</title>
https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap

<style>
 body{background:white;color:#222544;font-family:Montserrat;margin:0;padding:20px;text-align:center;}
 h1{font-size:2.4rem;margin-bottom:5px;} .subtitle{opacity:.8;margin-bottom:35px;}
 .container{max-width:900px;margin:auto;text-align:left;}
 .group-header{display:flex;justify-content:space-between;align-items:center;margin-top:20px;}
 .group-title{font-size:1.6rem;font-weight:600;}
 .select-all,.reset-link{cursor:pointer;font-size:.9rem;color:#222544;text-decoration:underline;transition:.2s;}
 .select-all:hover,.reset-link:hover{opacity:.6;}

 /* TILES */
 .tile{padding:18px 55px 18px 18px;margin:10px 0;border-radius:16px;cursor:pointer;transition:.25s;position:relative;color:black;}
 /* REMOVE 40% OPACITY — make unselected tiles solid */
 .tile.unselected{opacity:1;}
 .tile.selected{color:white;}

 .checkbox{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:26px;pointer-events:none;}
 .innovation.selected .checkbox,.global.selected .checkbox{color:#ffffff;}
 .selected:not(.innovation):not(.global) .checkbox{color:#222544;}
 .environment.selected,.sourcing.selected,.people.selected{color:black!important;}

 /* SHARE BUTTONS */
 .button-row{margin-top:40px;display:flex;justify-content:center;gap:15px;}
 .share-btn{padding:14px 28px;font-size:1.1rem;border:none;border-radius:50px;cursor:pointer;transition:0.3s;font-weight:600;letter-spacing:.5px;}
 .whatsapp-btn{background:#25D366;color:white;box-shadow:0 4px 10px rgba(0,0,0,0.15);} 
 .email-btn{background:#222544;color:white;box-shadow:0 4px 10px rgba(0,0,0,0.15);} 
 .share-btn:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(0,0,0,0.25);}

 #totals{text-align:center;font-size:1.3rem;margin-top:25px;font-weight:600;} 
 #adminNote{text-align:center;font-size:.9rem;font-style:italic;margin-top:5px;color:#444;}
</style>
</head>
<body>
<h1>2026-27 Proposal Shortlist Tool</h1>
<div class='subtitle'>Creating a better world together</div>

<div class='container' id='app'></div>
<div id='totals'></div>
<div id='adminNote'></div>

<div class='button-row'>
 <button class='share-btn whatsapp-btn' onclick='shareWhatsApp()'>Share to WhatsApp</button>
 <button class='share-btn email-btn' onclick='shareEmail()'>Share to Email</button>
</div>
<div style='text-align:center;margin-top:15px;'>
 <span class='reset-link' onclick='resetSelection()'>Reset selection</span>
</div>

<script>
/* DATA */
const groups=[
 {name:"Global",color:"#dc0014",css:"global",items:[{title:"Every Second Counts",cost:0,impact:0}]},
 {name:"Environment",color:"#a2c617",css:"environment",items:[
  {title:"Afghanistan: Equipping farmers for a sustainable food future",cost:105064,impact:110},
  {title:"Bolivia: Reinforced sustainable land protection and management",cost:24074,impact:370},
  {title:"Bangladesh: Super seeds for small-scale farmers and schools",cost:25533,impact:2028},
  {title:"Bolivia: Environmental protection and healthy food in the Bolivian Amazon",cost:29630,impact:150},
  {title:"Nigeria: Climate-smart sweet potato farming and nutrition education",cost:20008,impact:1800}
 ]},
 {name:"Innovation",color:"#4e0e75",css:"innovation",items:[
  {title:"Bangladesh: Community-led solutions for climate-migrants",cost:25000,impact:6440},
  {title:"Liberia: Skills for life and small business support for vulnerable women",cost:20000,impact:65},
  {title:"Nigeria: Using water as a path to peace",cost:21867,impact:13800},
  {title:"Zimbabwe: Water and dignity to transform communities",cost:30000,impact:800},
  {title:"Lebanon: Feeding the future of farmers",cost:40000,impact:4000}
 ]},
 {name:"People",color:"#fac800",css:"people",items:[
  {title:"Bangladesh: Essential aid to Rohingya refugees",cost:57000,impact:0},
  {title:"Afghanistan: Food, health care and livelihoods for the most marginalised",cost:17633,impact:540},
  {title:"DRC: Protecting children, young girls, and women working in mining",cost:40000,impact:150},
  {title:"Israel: Building a culture of peace with young people",cost:30000,impact:52},
  {title:"Sierra Leone: Financial empowerment for rural women and youth",cost:21741,impact:255}
 ]},
 {name:"Sourcing",color:"#30bac7",css:"sourcing",items:[
  {title:"El Salvador: Business skills, sustainable farming, and financial support for women",cost:21739,impact:869},
  {title:"Guatemala: Preventing gender-based violence and uplifting dignity for indigenous women",cost:37037,impact:390},
  {title:"Brazil: Supporting landless communities to access land, food, and justice",cost:74000,impact:51963},
  {title:"Honduras: Sugarcane processing plant and training centre for rural families",cost:24868,impact:350},
  {title:"Peru: Family food security, youth mental health support, and disaster preparation",cost:34091,impact:1926}
 ]}
];

let shortlist=[];

/* RENDER TILES */
function render(){
 const app=document.getElementById('app'); app.innerHTML="";
 groups.forEach(g=>{
   const header=document.createElement('div');
   header.className='group-header';
   header.innerHTML=`<div class='group-title'>${g.name}</div><div class='select-all' onclick='selectAll("${g.name}")'>Select all</div>`;
   app.appendChild(header);

   g.items.forEach(item=>{
     const tile=document.createElement('div');
     tile.className='tile unselected';
     tile.classList.add(g.css);
     tile.style.background=g.color+"40";

     const isSelected=shortlist.includes(item);
     tile.innerHTML=item.title+"<span class='checkbox'>"+(isSelected?"★":"☆")+"</span>";

     if(isSelected){ tile.classList.remove('unselected'); tile.classList.add('selected'); tile.style.background=g.color; }

     tile.onclick=()=>{
       if(isSelected) shortlist=shortlist.filter(x=>x!==item);
       else shortlist.push(item);
       updateTotals(); render();
     };

     app.appendChild(tile);
   });
 });
}

function selectAll(groupName){
 const g=groups.find(x=>x.name===groupName);
 g.items.forEach(item=>{ if(!shortlist.includes(item)) shortlist.push(item); });
 updateTotals(); render();
}

/* DONATION CALCULATION */
function updateTotals(){
 const projectTotal=shortlist.reduce((a,b)=>a+b.cost,0);
 const escSelected=shortlist.some(i=>i.title==="Every Second Counts");
 const totalDonation=escSelected? projectTotal/0.70 : projectTotal*1.10;
 const totalImpact=shortlist.reduce((a,b)=>a+b.impact,0);
 document.getElementById('totals').innerHTML=`Total Cost*: £${Math.round(totalDonation).toLocaleString()}<br>Lives changed: ${totalImpact.toLocaleString()}`;
 document.getElementById('adminNote').innerHTML='<em>*includes 10% CAFOD Admin fee.</em>';
}

function resetSelection(){ shortlist=[]; updateTotals(); render(); }

/* SHARE MESSAGE */
function buildShareMessage(){
 const list=shortlist.map(i=>"• "+i.title).join("%0A");
 return `My shortlisted projects for 2026-27...%0A%0A${list}`;
}

function shareWhatsApp(){ if(!shortlist.length) return alert('Select at least one project.'); window.open(`https://wa.me/?text=${buildShareMessage()}`); }
function shareEmail(){ if(!shortlist.length) return alert('Select at least one project.'); window.location.href=`mailto:?subject=My Shortlisted Projects&body=${buildShareMessage()}`; }

render(); updateTotals();
</script>
</body>
</html>
